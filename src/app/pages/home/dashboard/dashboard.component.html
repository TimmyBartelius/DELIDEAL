<div class="container-fluid mt-3">
  <!-- Sökfält -->
  <div class="row mb-3">
    <div class="col-12">
      <input
        type="text"
        class="form-control"
        placeholder="Sök produkter..."
        [(ngModel)]="searchTerm"
        (ngModelChange)="filterProducts()"
      />
    </div>
  </div>

  <!-- Huvudlayout -->
  <div class="row">
    <!-- Sidomeny -->
    <div class="col-md-3">
      <div class="card p-3 mb-3">
        <!-- Profil -->
        <div class="text-center mb-3">
          <img
            [src]="userProfileImage"
            alt="Profilbild"
            class="rounded-circle mb-2"
            width="80"
            height="80"
            style="cursor: pointer"
            (click)="fileInput.click()"
          />
          <input
            #fileInput
            type="file"
            accept="image/*"
            style="display: none"
            (change)="onProfileImageSelected($event)"
          />
          <h5>{{ userName }}</h5>
        </div>

        <!-- Ort -->
        <!-- <div class="mb-3">
          <label for="location" class="form-label">Din ort</label>
          <input
            type="text"
            id="location"
            #locationInput
            class="form-control"
            placeholder="Ange ort"
          />
          <button class="btn btn-primary mt-2 w-100" (click)="searchCity()">Sök stad</button>
        </div> -->
        <!-- TODO: UTVÄRDERA OM DET ÄR VÄRT ATT HA ORT ELLER EJ -->

        <!-- Google Maps placeholder -->
        <div class="mb-3">
          <app-map [radius]="radius"></app-map>
          <!-- radius från slidern -->
        </div>

        <!-- Slider -->
        <div class="mb-3">
          <label for="radius" class="form-label">Radie (km)</label>
          <input
            type="range"
            class="form-range"
            min="1"
            max="5"
            [(ngModel)]="radius"
            (input)="updateRadius()"
            id="radius"
          />
          <p>{{ radius }} km</p>
        </div>

        <!-- Checkboxes -->
        <div class="mb-3">
          <label class="form-label">Produktkategorier</label>
          <div *ngFor="let category of categories" class="form-check">
            <input
              class="form-check-input"
              type="checkbox"
              [id]="category.category"
              [(ngModel)]="category.selected"
              (change)="onCategoryChange()"
            />
            <label class="form-check-label" [for]="category.category">{{
              category.category
            }}</label>
          </div>
        </div>

        <!-- Logout-knapp -->
        <button class="btn btn-danger w-100 mt-3" (click)="logout()">Logga ut</button>
      </div>
    </div>

    <!-- Huvudinnehåll -->
    <div class="col-md-9">
      <div class="card p-3">
        <h2>Välkommen till DeliDeal!</h2>
        <p>Här kan du börja använda appen som inloggad användare.</p>
      </div>

      <!-- PRODUKTLISTAN -->
      <div class="row">
        <div
          class="col-md-4 mb-3"
          *ngFor="let product of filteredProducts | filterByName: searchTerm"
        >
          <div class="card h-100 p-3 shadow-sm text-center">
            <!-- Produktbild -->
            <img
              [src]="product.image || 'assets/logo.png'"
              alt="{{ product.name }}"
              class="card-img-top mb-2"
              style="height: 120px; object-fit: contain"
            />
            <!-- Produktnamn -->
            <h5>{{ product.name }}</h5>
            <!-- Pris -->
            <p class="mb-1">
              <span [ngClass]="{ 'text-danger fw-bold': product.specialOffer }">
                {{ product.price }} kr
              </span>
              <span *ngIf="product.specialOffer" class="badge bg-warning ms-2">Erbjudande!</span>
            </p>
            <!-- Lagerstatus -->
            <p class="mb-0">
              <small class="text-muted"> {{ product?.stockLevel | titlecase }} kvar </small>
            </p>
            <p class="text-muted">{{ product.category }}</p>
          </div>
        </div>
        <div class="col-12" *ngIf="filteredProducts.length === 0">
          <p>Inga produkter matchar ditt filter.</p>
        </div>
      </div>
    </div>
  </div>
</div>
