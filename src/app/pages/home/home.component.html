<div
  class="d-flex flex-column flex-fill justify-content-center align-items-center text-center px-3 py-5"
>
  <ng-container *ngIf="!auth.isLoggedIn; else loggedIn">
    <h1 class="mb-4 fs-3 fs-md-1">VÄLKOMMEN TILL DELIDEAL!</h1>

    <!-- Knappar -->
    <div class="d-flex flex-column flex-sm-row gap-3 w-100 justify-content-center">
      <button class="btn btn-success btn-lg flex-fill" (click)="goToLogin()">LOGGA IN</button>
      <button class="btn btn-outline-primary btn-lg flex-fill" (click)="goToRegister()">
        SKAPA KONTO
      </button>
    </div>
  </ng-container>

  <ng-template #loggedIn>
    <h1 class="fs-3 fs-md-1">Välkommen till DeliDeal!</h1>
  </ng-template>
</div>
