<div class="d-flex flex-column vh-100">

  <!-- Header -->
  <header class="navbar navbar-light bg-light shadow-sm">
    <div class="container-fluid d-flex justify-content-between align-items-center">
      <img src="assets/logo.png" alt="DeliDeal Logo" class="img-fluid" style="max-height: 60px;">
    </div>
  </header>

  <!-- Main -->
  <main class="flex-fill d-flex flex-column justify-content-center align-items-center text-center">
    <ng-container *ngIf="!auth.isLoggedIn; else loggedIn">
      <h1 class="mb-4">VÄLKOMMEN TILL DELIDEAL!</h1>
      <div class="d-flex gap-3">
        <button class="btn btn-success btn-lg" (click)="goToLogin()">LOGGA IN</button>
        <button class="btn btn-outline-primary btn-lg" (click)="goToRegister()">SKAPA KONTO</button>
      </div>
    </ng-container>

    <ng-template #loggedIn>
      <h1>Välkommen till DeliDeal!</h1>
    </ng-template>
  </main>

  <!-- Footer -->
  <footer class="mt-auto bg-light text-center text-muted py-3">
    <div class="mb-2">
      <span class="me-2">👤</span>
      <span class="me-2">⚙️</span>
      <span class="me-2">🔍</span>
      <span>A</span>
    </div>
    <p>Copyright - 2026, all rights reserved - DeliDeal AB, Gothenburg, SWEDEN</p>
  </footer>

</div>
