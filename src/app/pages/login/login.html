<div class="d-flex flex-column vh-100 bg-light">
  <main class="flex-fill d-flex flex-column justify-content-center align-items-center">
    <div class="card shadow p-4" style="max-width: 400px; width: 100%">
      <h2 class="text-center mb-4">Logga in</h2>

      <!-- Felmeddelande -->
      <div *ngIf="errorMessage" class="alert alert-danger">
        {{ errorMessage }}
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <!-- Användarnamn -->
        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input
            id="email"
            type="email"
            class="form-control"
            formControlName="email"
            placeholder="Skriv din email"
          />
          <div
            *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid"
            class="text-danger small mt-1"
          >
            Email krävs
          </div>
        </div>

        <!-- Lösenord -->
        <div class="mb-3">
          <label for="password" class="form-label">Lösenord</label>
          <input
            id="password"
            type="password"
            class="form-control"
            formControlName="password"
            placeholder="Skriv ditt lösenord"
          />
          <div
            *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid"
            class="text-danger small mt-1"
          >
            Lösenord krävs
          </div>
        </div>

        <div class="text-center mb-3">
          <span>Har du inget konto?</span>
          <a routerLink="/register">Registrera här</a>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn btn-success w-100" [disabled]="loginForm.invalid">
          Logga in
        </button>
      </form>
    </div>
  </main>
</div>
