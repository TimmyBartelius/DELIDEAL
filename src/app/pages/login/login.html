<div class="login-container">
  <h2>Logga in</h2>

  <!-- Felmeddelande -->
  <div *ngIf="errorMessage" class="error">
    {{ errorMessage }}
  </div>

  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
    <!-- Användarnamn -->
    <div class="form-group">
      <label for="username">Användarnamn</label>
      <input id="username" formControlName="username" placeholder="Skriv ditt användarnamn" />
      <div *ngIf="loginForm.get('username')?.touched && loginForm.get('username')?.invalid" class="validation-error">
        Användarnamn krävs
      </div>
    </div>

    <!-- Lösenord -->
    <div class="form-group">
      <label for="password">Lösenord</label>
      <input id="password" type="password" formControlName="password" placeholder="Skriv ditt lösenord" />
      <div *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid" class="validation-error">
        Lösenord krävs
      </div>
    </div>

    <div class="register-link">
      <span>Har du inget konto?</span>
      <a routerLink="/register">Registrera här</a>
    </div>

    <!-- Submit -->
    <button type="submit" [disabled]="loginForm.invalid">Logga in</button>
  </form>
</div>
